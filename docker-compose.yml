services:
  metadata-demo:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8501"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - metadata-demo
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
    ports:
      - "80:80"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
