services:
  metadata-demo:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8501"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - metadata-demo
    environment:
      SERVER_NAME: ${SERVER_NAME:?Set SERVER_NAME in .env to your public domain}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
